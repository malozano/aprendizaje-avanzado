<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 540" font-family="'Georgia', 'Times New Roman', serif">

  <!-- Background -->
  <rect width="780" height="540" fill="#FAFAFA"/>
  <rect x="75" y="50" width="680" height="400" fill="white" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Subtle horizontal grid lines -->
  <line x1="75" y1="400" x2="755" y2="400" stroke="#F3F4F6" stroke-width="1"/>
  <line x1="75" y1="350" x2="755" y2="350" stroke="#F3F4F6" stroke-width="1"/>
  <line x1="75" y1="300" x2="755" y2="300" stroke="#F3F4F6" stroke-width="1"/>
  <line x1="75" y1="250" x2="755" y2="250" stroke="#F3F4F6" stroke-width="1"/>
  <line x1="75" y1="200" x2="755" y2="200" stroke="#F3F4F6" stroke-width="1"/>
  <line x1="75" y1="150" x2="755" y2="150" stroke="#F3F4F6" stroke-width="1"/>

  <!-- ─── CLUSTER BACKGROUND SHADING (4 clusters, below cut 2) ─── -->
  <rect x="80"  y="330" width="112" height="120" fill="#DBEAFE" opacity="0.45" rx="4"/>
  <rect x="234" y="330" width="112" height="120" fill="#D1FAE5" opacity="0.45" rx="4"/>
  <rect x="404" y="330" width="112" height="120" fill="#FEF3C7" opacity="0.45" rx="4"/>
  <rect x="554" y="330" width="112" height="120" fill="#EDE9FE" opacity="0.45" rx="4"/>

  <!-- ─── DENDROGRAM BRANCHES ─── -->
  <!-- Stroke style: dark, rounded caps -->

  <!-- Leaves → M1 (p1, p2) — blue -->
  <line x1="100" y1="450" x2="100" y2="405" stroke="#2563EB" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="170" y1="450" x2="170" y2="405" stroke="#2563EB" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="100" y1="405" x2="170" y2="405" stroke="#2563EB" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Leaves → M2 (p3, p4) — emerald -->
  <line x1="260" y1="450" x2="260" y2="390" stroke="#059669" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="330" y1="450" x2="330" y2="390" stroke="#059669" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="260" y1="390" x2="330" y2="390" stroke="#059669" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Leaves → M3 (p5, p6) — amber -->
  <line x1="430" y1="450" x2="430" y2="398" stroke="#D97706" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="500" y1="450" x2="500" y2="398" stroke="#D97706" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="430" y1="398" x2="500" y2="398" stroke="#D97706" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Leaves → M4 (p7, p8) — violet -->
  <line x1="580" y1="450" x2="580" y2="405" stroke="#7C3AED" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="650" y1="450" x2="650" y2="405" stroke="#7C3AED" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="580" y1="405" x2="650" y2="405" stroke="#7C3AED" stroke-width="2.2" stroke-linecap="round"/>

  <!-- M1 stem up to cut2 (y=330) — blue -->
  <line x1="135" y1="405" x2="135" y2="330" stroke="#2563EB" stroke-width="2.2" stroke-linecap="round"/>
  <!-- M2 stem up to cut2 — emerald -->
  <line x1="295" y1="390" x2="295" y2="330" stroke="#059669" stroke-width="2.2" stroke-linecap="round"/>
  <!-- M3 stem up to cut2 — amber -->
  <line x1="465" y1="398" x2="465" y2="330" stroke="#D97706" stroke-width="2.2" stroke-linecap="round"/>
  <!-- M4 stem up to cut2 — violet -->
  <line x1="615" y1="405" x2="615" y2="330" stroke="#7C3AED" stroke-width="2.2" stroke-linecap="round"/>

  <!-- M1/M2 stems above cut2 to M5 — neutral dark (merged group) -->
  <line x1="135" y1="330" x2="135" y2="260" stroke="#374151" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="295" y1="330" x2="295" y2="260" stroke="#374151" stroke-width="2.2" stroke-linecap="round"/>
  <!-- M5 horizontal bar -->
  <line x1="135" y1="260" x2="295" y2="260" stroke="#374151" stroke-width="2.2" stroke-linecap="round"/>

  <!-- M3/M4 stems above cut2 to M6 -->
  <line x1="465" y1="330" x2="465" y2="255" stroke="#374151" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="615" y1="330" x2="615" y2="255" stroke="#374151" stroke-width="2.2" stroke-linecap="round"/>
  <!-- M6 horizontal bar -->
  <line x1="465" y1="255" x2="615" y2="255" stroke="#374151" stroke-width="2.2" stroke-linecap="round"/>

  <!-- M5/M6 stems up to cut1 (y=205) -->
  <line x1="215" y1="260" x2="215" y2="205" stroke="#374151" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="540" y1="255" x2="540" y2="205" stroke="#374151" stroke-width="2.2" stroke-linecap="round"/>

  <!-- M5/M6 stems above cut1 to M7 — lighter gray (root) -->
  <line x1="215" y1="205" x2="215" y2="150" stroke="#9CA3AF" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="540" y1="205" x2="540" y2="150" stroke="#9CA3AF" stroke-width="2.2" stroke-linecap="round"/>
  <!-- M7 horizontal bar — root -->
  <line x1="215" y1="150" x2="540" y2="150" stroke="#9CA3AF" stroke-width="2.2" stroke-linecap="round"/>

  <!-- ─── LEAF NODES ─── -->
  <!-- p1, p2 — blue -->
  <circle cx="100" cy="450" r="6" fill="#2563EB" stroke="white" stroke-width="1.5"/>
  <circle cx="170" cy="450" r="6" fill="#2563EB" stroke="white" stroke-width="1.5"/>
  <!-- p3, p4 — emerald -->
  <circle cx="260" cy="450" r="6" fill="#059669" stroke="white" stroke-width="1.5"/>
  <circle cx="330" cy="450" r="6" fill="#059669" stroke="white" stroke-width="1.5"/>
  <!-- p5, p6 — amber -->
  <circle cx="430" cy="450" r="6" fill="#D97706" stroke="white" stroke-width="1.5"/>
  <circle cx="500" cy="450" r="6" fill="#D97706" stroke="white" stroke-width="1.5"/>
  <!-- p7, p8 — violet -->
  <circle cx="580" cy="450" r="6" fill="#7C3AED" stroke="white" stroke-width="1.5"/>
  <circle cx="650" cy="450" r="6" fill="#7C3AED" stroke="white" stroke-width="1.5"/>

  <!-- ─── LEAF LABELS ─── -->
  <text x="100" y="475" text-anchor="middle" font-size="12" fill="#374151">x₁</text>
  <text x="170" y="475" text-anchor="middle" font-size="12" fill="#374151">x₂</text>
  <text x="260" y="475" text-anchor="middle" font-size="12" fill="#374151">x₃</text>
  <text x="330" y="475" text-anchor="middle" font-size="12" fill="#374151">x₄</text>
  <text x="430" y="475" text-anchor="middle" font-size="12" fill="#374151">x₅</text>
  <text x="500" y="475" text-anchor="middle" font-size="12" fill="#374151">x₆</text>
  <text x="580" y="475" text-anchor="middle" font-size="12" fill="#374151">x₇</text>
  <text x="650" y="475" text-anchor="middle" font-size="12" fill="#374151">x₈</text>

  <!-- ─── CUT LINE 2: K=4 (y=330) — blue dashed ─── -->
  <line x1="75" y1="330" x2="755" y2="330"
        stroke="#2563EB" stroke-width="2" stroke-dasharray="9,5" opacity="0.85"/>
  <!-- Label for cut 2 -->
  <rect x="614" y="314" width="136" height="22" rx="4" fill="#DBEAFE" stroke="#2563EB" stroke-width="1"/>
  <text x="682" y="329" text-anchor="middle" font-size="12" fill="#1D4ED8" font-weight="bold">Corte: K = 4</text>

  <!-- ─── CUT LINE 1: K=2 (y=205) — red dashed ─── -->
  <line x1="75" y1="205" x2="755" y2="205"
        stroke="#DC2626" stroke-width="2" stroke-dasharray="9,5" opacity="0.85"/>
  <!-- Label for cut 1 -->
  <rect x="614" y="189" width="136" height="22" rx="4" fill="#FEE2E2" stroke="#DC2626" stroke-width="1"/>
  <text x="682" y="204" text-anchor="middle" font-size="12" fill="#B91C1C" font-weight="bold">Corte: K = 2</text>

  <!-- ─── Y-AXIS ─── -->
  <line x1="75" y1="50" x2="75" y2="455" stroke="#374151" stroke-width="1.5"/>

  <!-- Ticks and labels (dist = 450 - y) -->
  <!-- dist=0, y=450 -->
  <line x1="70" y1="450" x2="75" y2="450" stroke="#374151" stroke-width="1.2"/>
  <text x="65" y="454" text-anchor="end" font-size="11" fill="#6B7280">0</text>
  <!-- dist=50, y=400 -->
  <line x1="70" y1="400" x2="75" y2="400" stroke="#374151" stroke-width="1.2"/>
  <text x="65" y="404" text-anchor="end" font-size="11" fill="#6B7280">50</text>
  <!-- dist=100, y=350 -->
  <line x1="70" y1="350" x2="75" y2="350" stroke="#374151" stroke-width="1.2"/>
  <text x="65" y="354" text-anchor="end" font-size="11" fill="#6B7280">100</text>
  <!-- dist=150, y=300 -->
  <line x1="70" y1="300" x2="75" y2="300" stroke="#374151" stroke-width="1.2"/>
  <text x="65" y="304" text-anchor="end" font-size="11" fill="#6B7280">150</text>
  <!-- dist=200, y=250 -->
  <line x1="70" y1="250" x2="75" y2="250" stroke="#374151" stroke-width="1.2"/>
  <text x="65" y="254" text-anchor="end" font-size="11" fill="#6B7280">200</text>
  <!-- dist=250, y=200 -->
  <line x1="70" y1="200" x2="75" y2="200" stroke="#374151" stroke-width="1.2"/>
  <text x="65" y="204" text-anchor="end" font-size="11" fill="#6B7280">250</text>
  <!-- dist=300, y=150 -->
  <line x1="70" y1="150" x2="75" y2="150" stroke="#374151" stroke-width="1.2"/>
  <text x="65" y="154" text-anchor="end" font-size="11" fill="#6B7280">300</text>

  <!-- Y-axis title (rotated) -->
  <text transform="rotate(-90, 18, 255)" x="18" y="255"
        text-anchor="middle" font-size="13" fill="#374151">Distancia de fusión</text>

  <!-- ─── CLUSTER LABELS (K=4 level) ─── -->
  <text x="136" y="497" text-anchor="middle" font-size="11" fill="#2563EB" font-style="italic">C₁</text>
  <text x="295" y="497" text-anchor="middle" font-size="11" fill="#059669" font-style="italic">C₂</text>
  <text x="465" y="497" text-anchor="middle" font-size="11" fill="#D97706" font-style="italic">C₃</text>
  <text x="615" y="497" text-anchor="middle" font-size="11" fill="#7C3AED" font-style="italic">C₄</text>

  <!-- ─── BRACE ANNOTATIONS FOR K=2 GROUPS ─── -->
  <!-- Left group (C1+C2) label -->
  <text x="215" y="183" text-anchor="middle" font-size="11" fill="#B91C1C" font-style="italic">{C₁, C₂}</text>
  <!-- Right group (C3+C4) label -->
  <text x="540" y="183" text-anchor="middle" font-size="11" fill="#B91C1C" font-style="italic">{C₃, C₄}</text>

  <!-- ─── TITLE ─── -->
  <text x="390" y="32" text-anchor="middle" font-size="14" fill="#1F3864" font-weight="bold">
    Dendrograma con cortes a diferentes alturas
  </text>

</svg>
